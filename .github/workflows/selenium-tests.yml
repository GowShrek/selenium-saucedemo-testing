name: Selenium Automated Tests

# Workflow này tự động chạy mỗi khi có người push code lên branch main,
# hoặc tạo pull request vào main. Mục đích: tự động xác minh rằng các
# test case Selenium vẫn pass, không cần ai phải tự chạy tay.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # cho phép bấm nút "Run workflow" chạy thủ công trên GitHub

jobs:
  test:
    name: Run Selenium tests on Chrome (headless)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Chrome and Python versions (debug info)
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version || true
          python --version
          pip show selenium webdriver-manager

      - name: Run Selenium test suite
        env:
          HEADLESS: "1"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set +e
          pytest tests/test_saucedemo.py -v -s --junitxml=results.xml 2>&1 | tee full_output.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        id: run_tests

      - name: Write diagnosis to Job Summary (always runs, even on failure)
        if: always()
        run: |
          echo "## Test run diagnosis" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          grep -B2 -A40 "Error\|Exception\|Traceback\|FAILED" full_output.log | head -150 >> "$GITHUB_STEP_SUMMARY" || echo "No Error/Exception lines found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnosis log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-log
          path: |
            full_output.log
          if-no-files-found: ignore

      - name: Upload screenshots of failed tests (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
