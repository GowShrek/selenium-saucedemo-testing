name: Selenium Automated Tests

# Workflow này tự động chạy mỗi khi có người push code lên branch main,
# hoặc tạo pull request vào main. Mục đích: tự động xác minh rằng các
# test case Selenium vẫn pass, không cần ai phải tự chạy tay.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # cho phép bấm nút "Run workflow" chạy thủ công trên GitHub

jobs:
  test:
    name: Run Selenium tests on Chrome (headless)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Selenium test suite
        env:
          HEADLESS: "1"
        run: |
          pytest tests/test_saucedemo.py -v -s --junitxml=results.xml

      - name: Upload screenshots of failed tests (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
